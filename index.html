    <!-- script for elapsed time in website -->
    <script>
        // Get saved total time or start at 0
        let totalTime = parseInt(localStorage.getItem("totalTime")) || 0;

            const startTime = Date.now();

        function updateElapsedTime() {
            const currentSession =
                Math.floor((Date.now() - startTime) / 1000);

            const totalElapsed = totalTime + currentSession;

        document.getElementById('elapsedTime').innerText =
        totalElapsed;
    }

        // Save when leaving page
    window.addEventListener("beforeunload", () => {
        const sessionTime =
        Math.floor((Date.now() - startTime) / 1000);

    totalTime += sessionTime;

    localStorage.setItem("totalTime", totalTime);
    });

        setInterval(updateElapsedTime, 1000);
    </script>
